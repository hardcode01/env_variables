name: Deployment
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
env:
  MONGODB_DB_NAME: gha-demo
  PORT: 8080
jobs:
  test:
    env:
      MONGODB_CLUSTER_ADDRESS: cluster0.avt7kr9.mongodb.net
      MONGODB_USERNAME: megapihor
      MONGODB_PASSWORD: 9fMoAIGVdr2eUoI6
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Test MongoDB connectivity
        run: nc -zv cluster0.avt7kr9.mongodb.net 27017 || echo "Cannot reach cluster"
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:${{ env.PORT }}
      - name: Run tests
        run: npm test
      - name: Output information
        run: |
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |        
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
          echo "MOGODB_DB_NAME: $MONGODB_DB_NAME"
